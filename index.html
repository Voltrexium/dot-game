<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Critical Mass</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    .site-nav {
      width: 100%;
      flex-shrink: 0;
      background: #12182b;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .site-nav__link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.7rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #9aa8c4;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .site-nav__link:hover {
      color: #c8d4e8;
    }

    .site-nav__link svg {
      flex-shrink: 0;
      opacity: 0.85;
    }

    .game-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    #status {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      min-height: 2.75rem;
      padding: 0.55rem 1.15rem;
      border-radius: 999px;
      border: 2px solid transparent;
      font-size: 1.05rem;
      text-align: center;
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    #status .turn-indicator__dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #status .turn-indicator__player {
      font-weight: 700;
    }

    #status.turn-p1 {
      background: rgba(78, 205, 196, 0.14);
      border-color: rgba(78, 205, 196, 0.5);
      box-shadow: 0 0 24px rgba(78, 205, 196, 0.18);
      color: #d8f5f2;
    }

    #status.turn-p1 .turn-indicator__dot {
      background: #4ecdc4;
      box-shadow: 0 0 10px rgba(78, 205, 196, 0.65);
    }

    #status.turn-p1 .turn-indicator__player {
      color: #4ecdc4;
    }

    #status.turn-p2 {
      background: rgba(255, 107, 107, 0.14);
      border-color: rgba(255, 107, 107, 0.5);
      box-shadow: 0 0 24px rgba(255, 107, 107, 0.18);
      color: #ffe8e8;
    }

    #status.turn-p2 .turn-indicator__dot {
      background: #ff6b6b;
      box-shadow: 0 0 10px rgba(255, 107, 107, 0.65);
    }

    #status.turn-p2 .turn-indicator__player {
      color: #ff6b6b;
    }

    #status.busy.turn-p1,
    #status.busy.turn-p2 {
      opacity: 0.92;
    }

    #status.busy .turn-indicator__dot {
      animation: pulse-dot 0.9s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.75; }
    }

    #status.error {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.22);
      color: #e8eaef;
    }

    #status.win-p1 {
      background: rgba(78, 205, 196, 0.18);
      border-color: rgba(78, 205, 196, 0.55);
      box-shadow: 0 0 28px rgba(78, 205, 196, 0.22);
      color: #4ecdc4;
      font-weight: 600;
    }

    #status.win-p2 {
      background: rgba(255, 107, 107, 0.18);
      border-color: rgba(255, 107, 107, 0.55);
      box-shadow: 0 0 28px rgba(255, 107, 107, 0.22);
      color: #ff6b6b;
      font-weight: 600;
    }

    .board-wrap {
      width: 100%;
      max-width: calc(520px + 2rem);
      background: #16213e;
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    canvas {
      display: block;
      max-width: 100%;
      cursor: pointer;
      border-radius: 6px;
      touch-action: manipulation;
    }

    .instructions {
      max-width: 420px;
      font-size: 0.9rem;
      line-height: 1.55;
      color: #aab;
      text-align: center;
    }

    .instructions strong {
      color: #4ecdc4;
    }

    .legend {
      display: flex;
      gap: 1.5rem;
      font-size: 0.95rem;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }

    .swatch.p1 { background: #4ecdc4; }
    .swatch.p2 { background: #ff6b6b; }

    button {
      padding: 0.55rem 1.25rem;
      font-size: 0.95rem;
      border: none;
      border-radius: 6px;
      background: #4ecdc4;
      color: #1a1a2e;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #3dbdb5;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    @media (max-width: 600px) {
      .game-main {
        justify-content: flex-start;
        padding: 1rem;
        gap: 1rem;
      }

      h1 {
        font-size: 1.4rem;
      }

      #status {
        font-size: 0.95rem;
        padding: 0.5rem 1rem;
        gap: 0.55rem;
      }

      .board-wrap {
        padding: 0.75rem;
      }

      .legend {
        font-size: 0.9rem;
        gap: 1.25rem;
      }

      .instructions {
        font-size: 0.85rem;
        padding: 0 0.25rem;
      }
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="Site navigation">
    <a href="/" class="site-nav__link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to Portfolio
    </a>
  </nav>

  <main class="game-main">
  <h1>Critical Mass</h1>

  <div class="legend">
    <span><span class="swatch p1"></span> Player 1</span>
    <span><span class="swatch p2"></span> Player 2</span>
  </div>

  <p id="status" class="turn-p1" role="status" aria-live="polite">
    <span class="turn-indicator__dot" aria-hidden="true"></span>
    <span class="turn-indicator__text"><span class="turn-indicator__player">Player 1</span>'s turn — tap one of your tiles</span>
  </p>

  <div class="board-wrap">
    <canvas id="game"></canvas>
  </div>

  <button id="restart" type="button" hidden>New Game</button>

  <p class="instructions">
    Tap or click your own tile to add a dot. Tiles explode at critical mass:
    <strong>corners 2</strong>, <strong>edges 3</strong>, <strong>center 4</strong>.
    Eliminate all opponent tiles to win.
  </p>
  </main>

  <script src="app.js"></script>
</body>
</html>
