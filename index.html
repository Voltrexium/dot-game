<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Critical Mass</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    .site-nav {
      width: 100%;
      flex-shrink: 0;
      background: #12182b;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .site-nav__link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.7rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #9aa8c4;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .site-nav__link:hover {
      color: #c8d4e8;
    }

    .site-nav__link svg {
      flex-shrink: 0;
      opacity: 0.85;
    }

    .game-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    #status {
      font-size: 1.1rem;
      min-height: 1.5em;
      text-align: center;
    }

    #status.error {
      color: #ff6b6b;
    }

    #status.win {
      color: #ffd93d;
      font-weight: 600;
    }

    .board-wrap {
      background: #16213e;
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    canvas {
      display: block;
      cursor: pointer;
      border-radius: 6px;
    }

    .instructions {
      max-width: 420px;
      font-size: 0.9rem;
      line-height: 1.55;
      color: #aab;
      text-align: center;
    }

    .instructions strong {
      color: #4ecdc4;
    }

    .legend {
      display: flex;
      gap: 1.5rem;
      font-size: 0.95rem;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }

    .swatch.p1 { background: #4ecdc4; }
    .swatch.p2 { background: #ff6b6b; }

    button {
      padding: 0.55rem 1.25rem;
      font-size: 0.95rem;
      border: none;
      border-radius: 6px;
      background: #4ecdc4;
      color: #1a1a2e;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #3dbdb5;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="Site navigation">
    <a href="/" class="site-nav__link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to Portfolio
    </a>
  </nav>

  <main class="game-main">
  <h1>Critical Mass</h1>

  <div class="legend">
    <span><span class="swatch p1"></span> Player 1</span>
    <span><span class="swatch p2"></span> Player 2</span>
  </div>

  <p id="status">Player 1's turn — click one of your tiles</p>

  <div class="board-wrap">
    <canvas id="game" width="520" height="520"></canvas>
  </div>

  <button id="restart" type="button" hidden>New Game</button>

  <p class="instructions">
    Click your own tile to add a dot. Tiles explode at critical mass:
    <strong>corners 2</strong>, <strong>edges 3</strong>, <strong>center 4</strong>.
    Eliminate all opponent tiles to win.
  </p>
  </main>

  <script src="app.js"></script>
</body>
</html>
